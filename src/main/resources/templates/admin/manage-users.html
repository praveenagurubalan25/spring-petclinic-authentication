<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
  <title>Manage Users</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">

      <h4 class="mb-0">Manage Users</h4>

      <a th:href="@{/admin/create-user}"
         class="btn btn-success">
        <i class="bi bi-plus-circle"></i>
        Create User
      </a>

    </div>

    <div class="card-body">

      <div class="row mb-3">

        <div class="col-md-4">
          <input type="text"
                 class="form-control"
                 placeholder="Search User">
        </div>

      </div>

      <table class="table table-hover align-middle">

        <thead class="table-light">

        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Last Login</th>
          <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="user : ${users}">

          <td th:text="${user.id}"></td>

          <td>
            <strong th:text="${user.username}"></strong>
          </td>

          <td th:text="${user.email}"></td>

          <td>
                        <span class="badge bg-primary"
                              th:text="${user.roles}">
                        </span>
          </td>

          <td>

                        <span th:if="${user.enabled}"
                              class="badge bg-success">
                            Active
                        </span>

            <span th:unless="${user.enabled}"
                  class="badge bg-danger">
                            Disabled
                        </span>

          </td>

          <td th:text="${user.lastLogin}"></td>

          <td>

            <!-- Edit -->

            <a th:href="@{/admin/edit-user/{id}(id=${user.id})}"
               class="btn btn-sm btn-primary">

              <i class="bi bi-pencil-square"></i>

            </a>

            <!-- Disable -->

            <a th:if="${user.enabled}"
               th:href="@{/admin/disable-user/{id}(id=${user.id})}"
               class="btn btn-sm btn-warning">

              <i class="bi bi-lock-fill"></i>

            </a>

            <!-- Enable -->

            <a th:unless="${user.enabled}"
               th:href="@{/admin/enable-user/{id}(id=${user.id})}"
               class="btn btn-sm btn-success">

              <i class="bi bi-unlock-fill"></i>

            </a>

            <!-- Delete -->

            <a th:href="@{/admin/delete-user/{id}(id=${user.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Delete this user?')">

              <i class="bi bi-trash-fill"></i>

            </a>

          </td>

        </tr>

        </tbody>

      </table>

    </div>

  </div>

  <div class="mt-3">

    <a th:href="@{/admin/dashboard}"
       class="btn btn-secondary">

      <i class="bi bi-arrow-left"></i>
      Back To Dashboard

    </a>

  </div>

</div>

</body>
</html>
