<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>

  <title>Create Veterinarian</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-success text-white">

      <h3>Create Veterinarian</h3>

    </div>

    <div class="card-body">

      <form th:action="@{/admin/create-vet}"
            th:object="${vet}"
            method="post">

        <div class="mb-3">

          <label>Full Name</label>

          <input type="text"
                 class="form-control"
                 th:field="*{fullName}">

        </div>

        <div class="mb-3">

          <label>Email</label>

          <input type="email"
                 class="form-control"
                 th:field="*{email}">

        </div>

        <div class="mb-3">

          <label>Phone</label>

          <input type="text"
                 class="form-control"
                 th:field="*{phone}">

        </div>

        <div class="mb-3">

          <label>Qualification</label>

          <input type="text"
                 class="form-control"
                 th:field="*{qualification}">

        </div>

        <div class="mb-3">

          <label>Specialization</label>

          <input type="text"
                 class="form-control"
                 th:field="*{specialization}">

        </div>

        <div class="mb-3">

          <label>Experience (Years)</label>

          <input type="number"
                 class="form-control"
                 th:field="*{experienceYears}">

        </div>
        <div class="mb-3">

          <label>Select User</label>

          <select class="form-select"
                  name="userId">

            <option th:each="user : ${users}"
                    th:value="${user.id}"
                    th:text="${user.username}">
            </option>

          </select>

        </div>

        <button class="btn btn-success">

          Save Veterinarian

        </button>

      </form>

    </div>

  </div>

</div>

</body>

</html>
