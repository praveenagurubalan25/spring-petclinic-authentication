<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Edit User</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

  <div class="row justify-content-center">

    <div class="col-lg-8">

      <div class="card shadow border-0">

        <div class="card-header bg-dark text-white">

          <h3 class="mb-0">
            <i class="bi bi-person-gear"></i>
            Edit User
          </h3>

        </div>

        <div class="card-body">

          <form th:action="@{/admin/users/update}"
                th:object="${user}"
                method="post">

            <!-- Hidden User ID -->
            <input type="hidden" th:field="*{id}">

            <!-- Username -->
            <div class="mb-3">

              <label class="form-label fw-bold">
                Username
              </label>

              <input type="text"
                     th:field="*{username}"
                     class="form-control"
                     required>

            </div>

            <!-- Email -->
            <div class="mb-3">

              <label class="form-label fw-bold">
                Email
              </label>

              <input type="email"
                     th:field="*{email}"
                     class="form-control"
                     required>

            </div>

            <!-- Roles -->
            <div class="mb-3">

              <label class="form-label fw-bold">
                Role
              </label>

              <input type="text"
                     class="form-control"
                     th:value="${user.roles}"
                     readonly>

            </div>

            <!-- Account Status -->
            <div class="form-check form-switch mb-4">

              <input class="form-check-input"
                     type="checkbox"
                     th:field="*{enabled}">

              <label class="form-check-label fw-bold">
                Account Enabled
              </label>

            </div>

            <!-- Created Date -->
            <div class="mb-3">

              <label class="form-label fw-bold">
                Created At
              </label>

              <input type="text"
                     class="form-control"
                     th:value="${user.createdAt}"
                     readonly>

            </div>

            <!-- Last Login -->
            <div class="mb-4">

              <label class="form-label fw-bold">
                Last Login
              </label>

              <input type="text"
                     class="form-control"
                     th:value="${user.lastLogin}"
                     readonly>

            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">

              <a th:href="@{/admin/manage-users}"
                 class="btn btn-secondary">

                <i class="bi bi-arrow-left"></i>
                Back

              </a>

              <button type="submit"
                      class="btn btn-success">

                <i class="bi bi-check-circle"></i>
                Save Changes

              </button>

            </div>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
