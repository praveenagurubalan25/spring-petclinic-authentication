<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>

  <title>Create User</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-dark text-white">

      <h3>Create User</h3>

    </div>

    <div class="card-body">

      <form th:action="@{/admin/create-user}"
            th:object="${user}"
            method="post">

        <div class="mb-3">

          <label>Username</label>

          <input type="text"
                 th:field="*{username}"
                 class="form-control"
                 required>

        </div>

        <div class="mb-3">

          <label>Email</label>

          <input type="email"
                 th:field="*{email}"
                 class="form-control"
                 required>

        </div>

        <div class="mb-3">

          <label>Password</label>

          <input type="password"
                 th:field="*{password}"
                 class="form-control"
                 required>

        </div>

        <div class="mb-3">

          <label>Role</label>

          <select name="role"
                  class="form-select"
                  required>

            <option value="">Select Role</option>

            <option value="ROLE_OWNER">
              Owner
            </option>

            <option value="ROLE_VET">
              Veterinarian
            </option>

            <option value="ROLE_ADMIN">
              Admin
            </option>

          </select>

        </div>

        <button type="submit"
                class="btn btn-success">

          Create User

        </button>

        <a th:href="@{/admin/dashboard}"
           class="btn btn-secondary">

          Back

        </a>

      </form>

    </div>

  </div>

</div>

</body>
</html>
