<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
  <title>PetClinic Login</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f6f9;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      width:350px;
      background:white;
      padding:30px;
      border-radius:12px;
      box-shadow:0 4px 12px rgba(0,0,0,.15);
    }

    h2{
      text-align:center;
      color:#2c3e50;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      margin-bottom:15px;
      border:1px solid #ccc;
      border-radius:6px;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#1976d2;
      color:white;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#1259a7;
    }

    .message{
      text-align:center;
      color:green;
      margin-bottom:10px;
    }

    .error{
      text-align:center;
      color:red;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>PetClinic Login</h2>

  <div th:if="${param.error}" class="error">
    Invalid Username or Password
  </div>

  <div th:if="${param.logout}" class="message">
    Logged out successfully
  </div>

  <form th:action="@{/login}" method="post">

    <input
      type="text"
      name="username"
      placeholder="Username"
      required>

    <input
      type="password"
      name="password"
      placeholder="Password"
      required>

    <button type="submit">
      Login
    </button>

  </form>
  <p>
    New User?
    <a th:href="@{/register}">
      Register Here
    </a>
  </p>

</div>

</body>
</html>
