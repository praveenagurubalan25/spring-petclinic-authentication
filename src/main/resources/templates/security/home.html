<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
  <title>PetClinic Home</title>

  <style>

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f4f6f9;
    }

    .navbar{
      background:#1976d2;
      color:white;
      padding:15px 30px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .container{
      padding:40px;
    }

    .card{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 3px 10px rgba(0,0,0,.15);
    }

    button{
      background:#e53935;
      color:white;
      border:none;
      padding:10px 16px;
      border-radius:6px;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="navbar">

  <h2>PetClinic Dashboard</h2>

  <form th:action="@{/logout}" method="post">
    <button type="submit">
      Logout
    </button>
  </form>

</div>

<div class="container">

  <div class="card">

    <h2>Welcome to PetClinic</h2>

    <p>
      Login successful.
    </p>

    <p>
      Security Authentication Working Successfully.
    </p>

  </div>

</div>

</body>
</html>
