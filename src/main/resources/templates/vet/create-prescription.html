<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
  <title>Create Prescription</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="card shadow">

    <div class="card-header bg-success text-white">
      <h3>Create Prescription</h3>
    </div>

    <div class="card-body">

      <form th:action="@{/prescriptions/create}"
            th:object="${prescription}"
            method="post">



        <select id="ownerSelect"
                class="form-select mb-3">

          <option value="">Select Owner</option>

          <option th:each="owner : ${owners}"
                  th:value="${owner.id}"
                  th:text="${owner.firstName + ' ' + owner.lastName}">
          </option>

        </select>

        <select id="petSelect"
                class="form-select mb-3"
                th:field="*{petName}">

          <option value="">
            Select Pet
          </option>

        </select>

        <input type="date"
               class="form-control mb-3"
               th:field="*{visitDate}">

        <textarea class="form-control mb-3"
                  placeholder="Reason for Visit"
                  th:field="*{reasonForVisit}">
                </textarea>

        <textarea class="form-control mb-3"
                  placeholder="Diagnosis"
                  th:field="*{diagnosis}">
                </textarea>

        <textarea class="form-control mb-3"
                  placeholder="Medicines"
                  th:field="*{medicines}">
                </textarea>

        <textarea class="form-control mb-3"
                  placeholder="Instructions"
                  th:field="*{instructions}">
                </textarea>

        <select class="form-select mb-3"
                name="vetId">

          <option th:each="vet : ${vets}"
                  th:value="${vet.id}"
                  th:text="${vet.fullName}">
          </option>

        </select>

        <button class="btn btn-success">
          Save Prescription
        </button>

      </form>

    </div>

  </div>

</div>

<script>

  document.getElementById("ownerSelect")
    .addEventListener("change", function() {

      let ownerId = this.value;

      console.log("Owner ID =", ownerId);

      fetch("/prescriptions/pets/" + ownerId)

        .then(response => response.json())

        .then(data => {

          console.log(data);

          let petDropdown =
            document.getElementById("petSelect");

          petDropdown.innerHTML =
            '<option value="">Select Pet</option>';

          data.forEach(function(pet) {

            let option =
              document.createElement("option");

            option.value = pet.name;
            option.text = pet.name;

            petDropdown.appendChild(option);

          });

        })

        .catch(error => console.log(error));

    });

</script>

</body>
</html>
