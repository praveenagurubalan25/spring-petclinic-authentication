# ===============================
# DATABASE CONFIG (MYSQL - DEV)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/petclinic_security
spring.datasource.username=root
spring.datasource.password=Root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategySnakeCaseImpl

# ===============================
# SQL INITIALIZATION (IMPORTANT FOR TESTS)
# ===============================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath*:db/mysql/schema.sql
spring.sql.init.data-locations=classpath*:db/mysql/data.sql

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.mode=HTML

# ===============================
# INTERNATIONALIZATION
# ===============================
spring.messages.basename=messages/messages

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO

# ===============================
# STATIC RESOURCES CACHE
# ===============================
spring.web.resources.cache.cachecontrol.max-age=12h
